<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Links</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0f0f0f;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow: hidden;
      margin: 0;
    }

    .links-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 480px;
    }

    .link-row {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }

    .link-row:hover .link-pill,
    .link-row:focus .link-pill {
      background-color: #2a2a2a;
      border-color: #555;
    }

    .link-row:hover .avatar,
    .link-row:focus .avatar {
      border-color: #888;
    }

    /* Circle avatar */
    .avatar {
      width: 56px;
      height: 56px;
      min-width: 56px;
      border-radius: 50%;
      background-color: #1e1e1e;
      border: 2px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      transition: border-color 0.2s ease;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .avatar .fa-envelope { color: #a8c4e0; }
    .avatar .fa-tiktok   { color: #e8e8e8; }
    .avatar .fa-instagram { color: #e1a0c8; }
    .avatar .fa-strava   { color: #fc4c02; }

    /* Pill */
    .link-pill {
      flex: 1;
      height: 56px;
      border-radius: 28px;
      background-color: #1a1a1a;
      border: 2px solid #333;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .link-pill .label {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
      color: #e8e8e8;
    }

    .link-pill .sublabel {
      font-size: 13px;
      font-weight: 400;
      color: #888;
      line-height: 1.2;
    }

.profile-container {
  width: 200px;    /* Set a fixed width */
  height: 200px;   /* Set the same fixed height to make it a square */
  overflow: hidden; /* Hide the parts of the image outside the circle */
  border-radius: 50%; /* This creates the circle shape */
}

.profile-container img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* This prevents the image from stretching */
  cursor: pointer; /* Indicate that the image is clickable */
}

header {
    max-width: 480px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2rem;
}

        .ghost {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            opacity: 0.5;
            filter: brightness(1.2) contrast(1.2) blur(1px);
            pointer-events: none;
            z-index: 5;
            /* Smooth transition for when we trigger deletion */
            transition: opacity 0.3s ease-out;
        }

  </style>
</head>
<body>

    <script>
        const mainPic = document.getElementById('profile-pic');
        const gravity = 0.2;
        const ghostQueue = []; // The queue to track our ghosts

        mainPic.addEventListener('click', () => {
            const rect = mainPic.getBoundingClientRect();
            createGhost(rect.left, rect.top);
        });

        function createGhost(targetX, targetY) {
            const ghost = document.createElement('img');
            ghost.src = mainPic.src;
            ghost.className = 'ghost';

            ghost.style.left = `${targetX}px`;
            ghost.style.top = `${targetY}px`;
            document.body.appendChild(ghost);

            // 1. Manage the Queue
            ghostQueue.push(ghost);
            if (ghostQueue.length > 5) {
                const oldestGhost = ghostQueue.shift();
                removeGhost(oldestGhost);
            }

            // 2. Physics setup
            const speed = Math.random() * 8 + 6;
            const angle = (Math.random() * (Math.PI / 2)) + (Math.PI / 4);
            let velocityX = Math.cos(angle) * speed;
            let velocityY = -Math.sin(angle) * speed;
            let rotation = 0;
            const rotationSpeed = (Math.random() - 0.5) * 15;

            let currentX = 0;
            let currentY = 0;
            let isActive = true;

            function animate() {
                // If the ghost was removed from the DOM by the queue, stop the loop
                if (!document.body.contains(ghost)) return;

                velocityY += gravity;
                currentX += velocityX;
                currentY += velocityY;
                rotation += rotationSpeed;

                ghost.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotation}deg)`;

                // Auto-delete if it falls off the bottom
                if (targetY + currentY > window.innerHeight + 250) {
                    // Remove from queue if it's still there
                    const index = ghostQueue.indexOf(ghost);
                    if (index > -1) ghostQueue.splice(index, 1);
                    ghost.remove();
                } else {
                    requestAnimationFrame(animate);
                }
            }

            requestAnimationFrame(animate);
        }

        function removeGhost(el) {
            // Optional: Fade out before removing
            el.style.opacity = '0';
            setTimeout(() => {
                if (el.parentNode) el.remove();
            }, 300);
        }
    </script>
</body>
